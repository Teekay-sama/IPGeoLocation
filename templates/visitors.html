<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recorded Visitors</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      overflow: hidden;
      border-radius: 10px;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #162033;
    }
    a {
      color: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Recorded Visitors</h1>
    <p><a href="/">Back to form</a></p>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>IP Address</th>
          <th>User Agent</th>
          <th>Consent</th>
          <th>Date / Time</th>
        </tr>
      </thead>
      <tbody>
        {% for v in visitors %}
        <tr>
          <td>{{ v[0] }}</td>
          <td>{{ v[1] }}</td>
          <td>{{ v[2] }}</td>
          <td>{{ v[3] }}</td>
          <td>{{ "Yes" if v[4] == 1 else "No" }}</td>
          <td>{{ v[5] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
